# Maps Slack surfaces -> Project + repo coordinates. Version-controlled (no secrets).
# Open discovery surface. Set to the Slack channel id of an open "lobby" channel
# where anyone can ask without naming a project; Babbla routes the question to the
# right project, answers public/internal, and points to private projects' channels.
# null = no lobby (the lobby path is inert).
lobby_channel_id: null
projects:
  - name: MyTV
    owner: Wkkkkk
    repo: MyTV
    visibility: public
    # Slack channel id for the Shared Ask surface. Fill in once the channel exists;
    # null means "no channel binding yet" (DM still works via dm: true).
    channel_id: C0BBK6SJTND
    # Answer DMs (Private Ask) about this project. Exactly one project may set dm: true in the pilot.
    dm: true
    # Phase 3 digest: a weekly "what shipped" summary of new commits on the default branch,
    # posted to channel_id above. anchor: branch (MyTV deploys manually off-GitHub).
    digest:
      cadence: weekly
      tz: Europe/Stockholm
      anchor: branch
      # Optional: narrow this digest to a thematic slice. The summarizer covers
      # only changes relevant to the topic and stays silent when none match.
      # topic:
      #   name: security
      #   description: "auth, secrets, access control, CVEs, dependency security bumps"
# Shared Subscriptions: let ONE channel follow a SET of projects (a "portfolio"
# channel). A question there is routed to the right project; today's 1:1
# single-project channels (channel_id on a project above) keep working unchanged.
# Omit this block entirely for the 1:1 default. Example:
# subscriptions:
#   - channel_id: C0PORTFOLIO   # the portfolio channel's Slack id
#     projects: [MyTV]          # names from `projects:` above; >= 1, all must exist
# Scheduled actions (optional). Beyond a project's own `digest:` above, you can:
#  - give a SUBSCRIPTION an aggregated digest covering all its projects:
#      subscriptions:
#        - channel_id: C0PORTFOLIO
#          projects: [MyTV]
#          digest:
#            cadence: weekly       # daily | weekly
#            tz: Europe/Stockholm
#          # Optional: narrow this digest to a thematic slice. The summarizer covers
#          # only changes relevant to the topic and stays silent when none match.
#          # topic:
#          #   name: security
#          #   description: "auth, secrets, access control, CVEs, dependency security bumps"
#  - give a PROJECT a weekly read-only quiz posted to its channel (answers in a thread):
#      quiz:
#        cadence: weekly           # daily | weekly
#        tz: Europe/Stockholm
#        count: 3                  # number of questions (default 3)
# Personal Subscriptions (optional). When this block is present, subscribers
# receive a Personal Digest by DM on the cadence each user picks via
# `/babbla digest <daily|weekly|off>` (default below applies until they choose).
# Management (`/babbla subscribe|unsubscribe|list`) works even without this block;
# personal DM-ask routing and the digest require it.
# personal_digest:
#   default_cadence: weekly   # daily | weekly
#   tz: Europe/Stockholm
